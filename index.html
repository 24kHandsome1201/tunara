<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Conduit</title>
    <script>
      (function () {
        try {
          var dark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          if (dark) document.documentElement.classList.add("dark");
          var accent = "#c2683c";
          var root = document.documentElement.style;
          root.setProperty("--c-accent", accent);
          var hex = parseInt(accent.slice(1), 16);
          var ar = [(hex >> 16) & 255, (hex >> 8) & 255, hex & 255];
          var base = dark ? [24, 24, 27] : [255, 255, 255];
          function mix(a, fg, bg) {
            var r = Math.round(fg[0]*a+bg[0]*(1-a)), g = Math.round(fg[1]*a+bg[1]*(1-a)), b = Math.round(fg[2]*a+bg[2]*(1-a));
            return "#" + ((1<<24)|(r<<16)|(g<<8)|b).toString(16).slice(1);
          }
          root.setProperty("--c-accent-bg-light", mix(dark ? 0.18 : 0.12, ar, base));
          root.setProperty("--c-accent-bg-soft", mix(dark ? 0.10 : 0.06, ar, base));
          root.setProperty("--c-accent-border", mix(dark ? 0.30 : 0.22, ar, base));
        } catch (e) {}
      })();
    </script>
  </head>

  <body>
    <div id="root">
      <div id="terminal"></div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
