# cargo-audit configuration.
#
# RUSTSEC-2023-0071 — "Marvin Attack" RSA timing sidechannel in the `rsa` crate.
# We pull `rsa` ONLY transitively through `russh`/`ssh-key` (RSA host-key and
# RSA pubkey auth support); see `cargo tree -i rsa`. There is no fixed `rsa`
# release — the advisory is an unresolved upstream timing sidechannel that every
# russh-based SSH client currently ships with.
#
# Why the residual risk is acceptable for Tunara:
#  - The attack requires an active network MITM positioned to harvest many
#    RSA decryption timing samples; Tunara is an interactive desktop SSH client,
#    not a server doing high-volume RSA operations.
#  - Tunara prefers ed25519 keys (auth chain tries agent keys / configured key
#    first); RSA is a fallback, not the default path.
#  - Dropping `rsa` would mean dropping RSA-server compatibility entirely, which
#    is worse for users than the timing-sidechannel exposure.
#
# Revisit when `rsa` ships a fixed release or russh exposes a way to build
# without the RSA feature.
#
# RUSTSEC-2026-0194 / RUSTSEC-2026-0195 — unbounded namespace/attribute
# allocation in `quick-xml` readers enables memory-exhaustion DoS when parsing
# attacker-controlled XML. Fixed in quick-xml >= 0.41.0, but we pull quick-xml
# ONLY transitively through `plist` inside `tauri` (see `cargo tree -i
# quick-xml`), and the latest `plist` (1.9.0, already locked) still pins
# quick-xml 0.39.x — 0.41 is not reachable from our dependency graph yet.
#
# Why the residual risk is acceptable for Tunara:
#  - quick-xml here parses macOS property lists (app bundle Info.plist,
#    system plists) read locally by tauri — trusted, local input, not
#    network-facing or attacker-supplied XML.
#  - Worst case is a memory-exhaustion DoS of the local desktop app, which a
#    local attacker able to plant a malicious plist could achieve more simply.
#
# Revisit when `plist` releases a version on quick-xml >= 0.41 (then
# `cargo update -p plist -p quick-xml` and drop these two ignores).

[advisories]
ignore = ["RUSTSEC-2023-0071", "RUSTSEC-2026-0194", "RUSTSEC-2026-0195"]
