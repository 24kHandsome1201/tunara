name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            label: linux
          - os: macos-latest
            label: macos
    runs-on: ${{ matrix.os }}
    name: test (${{ matrix.label }})
    steps:
      - uses: actions/checkout@v7

      - name: Install Linux build dependencies
        if: matrix.label == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libssl-dev \
            patchelf

      - uses: pnpm/action-setup@v6
        with:
          version: 9.15.4

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target
          key: ${{ matrix.label }}

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify Tauri npm/cargo version coupling
        run: bash scripts/check-tauri-version-coupling.sh

      - name: Typecheck frontend
        run: pnpm typecheck

      - name: Lint frontend
        run: pnpm lint

      - name: Build frontend
        run: pnpm build

      - name: Check Rust formatting
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --check

      - name: Run Rust clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

      # Frontend and Rust tests run as independent steps so a frontend failure
      # does not skip the Rust suite (pnpm test chains them with &&, which
      # masks Rust regressions when Node tests fail first).
      - name: Run frontend tests
        run: pnpm test:node

      - name: Run Rust tests
        if: always()
        run: cargo test --manifest-path src-tauri/Cargo.toml

      # Verify the Tauri binary actually links on macOS — the dev/release CI
      # flows have skipped this in the past, so vibrancy, macos-private-api,
      # and window-state surfaces went unchecked until tag time.
      - name: Build Tauri binary (release)
        if: matrix.label == 'macos'
        run: cargo build --manifest-path src-tauri/Cargo.toml --release --bin tunara
