name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  codeql:
    name: CodeQL (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]
    steps:
      - uses: actions/checkout@v7
      - uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
      - uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"

  cargo-audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Run cargo audit
        working-directory: src-tauri
        # RUSTSEC-2023-0071 (rsa Marvin attack) is a transitive russh dep with
        # no upstream fix; ignored with rationale in src-tauri/.cargo/audit.toml.
        # Passed explicitly too so the exception is visible in the workflow.
        run: cargo audit --ignore RUSTSEC-2023-0071

  pnpm-audit:
    name: pnpm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 9.15.4
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      # No `cache: pnpm` here: this job runs `pnpm audit` straight off the
      # lockfile without `pnpm install`, so the pnpm store never gets populated.
      # With caching enabled, setup-node's post-job step fails with
      # "Path Validation Error: Path(s) ... do(es) not exist" and reds the job.
      - name: Run pnpm audit
        run: pnpm audit --prod --audit-level high
