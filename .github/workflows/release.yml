name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 9.15.4

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare macOS release config
        if: runner.os == 'macOS'
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          set -euo pipefail
          # When APPLE_SIGNING_IDENTITY is set we let tauri-action use real Developer ID + notarization.
          # Otherwise fall back to ad-hoc signing so unsigned builds still produce a dmg.
          if [ -n "${APPLE_SIGNING_IDENTITY:-}" ]; then
            printf '%s\n' '{"bundle":{"createUpdaterArtifacts":true}}' > /tmp/tauri-release-ci.json
          else
            printf '%s\n' '{"bundle":{"createUpdaterArtifacts":true,"macOS":{"signingIdentity":"-"}}}' > /tmp/tauri-release-ci.json
          fi

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Tunara ${{ github.ref_name }}"
          releaseBody: "See [CHANGELOG.md](https://github.com/24kHandsome1201/tunara/blob/main/CHANGELOG.md) for release notes. Auto-update is built in."
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }} --config /tmp/tauri-release-ci.json

      - name: Verify macOS release artifacts
        if: runner.os == 'macOS'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          DMG=$(find src-tauri/target -name 'Tunara_*.dmg' -type f -print -quit)
          if [ -z "$DMG" ]; then
            echo "No Tunara DMG was produced"
            exit 1
          fi

          scripts/verify-macos-release-bundle.sh "$DMG"

          UPDATER_ARCHIVE=$(find src-tauri/target -name '*.app.tar.gz' -type f -print -quit)
          UPDATER_SIGNATURE=$(find src-tauri/target -name '*.app.tar.gz.sig' -type f -print -quit)
          if [ -z "$UPDATER_ARCHIVE" ] || [ -z "$UPDATER_SIGNATURE" ]; then
            echo "Updater archive/signature were not produced"
            exit 1
          fi
          test -s "$UPDATER_ARCHIVE"
          test -s "$UPDATER_SIGNATURE"

          ASSETS=$(gh release view "${GITHUB_REF_NAME}" --json assets --jq '.assets[].name')
          if ! printf '%s\n' "$ASSETS" | grep -Fxq 'latest.json'; then
            echo "latest.json was not uploaded to the GitHub release"
            exit 1
          fi
          if ! printf '%s\n' "$ASSETS" | grep -Eq '\.app\.tar\.gz$'; then
            echo "Updater archive was not uploaded to the GitHub release"
            exit 1
          fi
          if ! printf '%s\n' "$ASSETS" | grep -Eq '\.app\.tar\.gz\.sig$'; then
            echo "Updater signature was not uploaded to the GitHub release"
            exit 1
          fi

  update-homebrew-cask:
    needs: publish-tauri
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # Tag push 触发的 workflow 默认 checkout 到 detached HEAD（tag ref），
      # 而我们要把 cask 改动 commit 到 main 上，所以显式 checkout main。
      - uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0

      - name: Compute dmg sha256 and update cask
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME#v}"

          DMG_URL=$(gh release view "${GITHUB_REF_NAME}" --json assets \
            --jq '.assets[] | select(.name | test("Tunara_.*\\.dmg")) | .url' | head -1)
          if [ -z "$DMG_URL" ]; then
            echo "::error::No .dmg asset found on release ${GITHUB_REF_NAME}"
            exit 1
          fi

          SHA=$(curl -fsSL "$DMG_URL" | shasum -a 256 | awk '{print $1}')
          echo "Computed sha256: $SHA for version $TAG"

          # 更新 homebrew/tunara.rb 中的 version 和 sha256（覆盖 :no_check 或旧值）
          sed -i.bak "s/version \".*\"/version \"$TAG\"/" homebrew/tunara.rb
          sed -i.bak -E "s/^  sha256 .*/  sha256 \"$SHA\"/" homebrew/tunara.rb
          rm -f homebrew/tunara.rb.bak

          if git diff --quiet homebrew/tunara.rb; then
            echo "Homebrew cask already up to date; nothing to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add homebrew/tunara.rb
          git commit -m "chore: update homebrew cask to v${TAG} (sha256 ${SHA:0:12}…)"
          # 显式推到 main；detached HEAD 时 `git push` 会失败而无声 exit 0
          git push origin HEAD:main
