name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_mode:
        description: "Which macOS installer lane to build"
        required: true
        default: both
        type: choice
        options:
          - both
          - direct
          - legacy

jobs:
  publish-tauri:
    if: github.event_name == 'push' || inputs.release_mode == 'both' || inputs.release_mode == 'direct'
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin

    runs-on: ${{ matrix.platform }}
    timeout-minutes: 150
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 9.15.4

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare macOS release config
        if: runner.os == 'macOS'
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          # v1.6.0 regression: when these secrets were empty/missing the workflow
          # silently fell back to ad-hoc signing + skipped notarization, leaving
          # Gatekeeper-rejected dmgs on the release page. Fail fast instead.
          missing=()
          for var in APPLE_SIGNING_IDENTITY APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD APPLE_ID APPLE_PASSWORD APPLE_TEAM_ID; do
            if [ -z "${!var:-}" ]; then missing+=("$var"); fi
          done
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required Apple secrets: ${missing[*]}"
            exit 1
          fi
          printf '%s\n' '{"bundle":{"createUpdaterArtifacts":true}}' > /tmp/tauri-release-ci.json

      - name: Build and publish Tauri release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Tunara ${{ github.ref_name }}"
          releaseBody: "See [CHANGELOG.md](https://github.com/24kHandsome1201/tunara/blob/main/CHANGELOG.md) for release notes. Use the normal dmg for direct install. The -legacy dmg is the previous manual install path and is not used by Homebrew or auto-update."
          releaseDraft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          args: ${{ matrix.args }} --config /tmp/tauri-release-ci.json

      - name: Build Tauri release dry-run
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          args: ${{ matrix.args }} --config /tmp/tauri-release-ci.json

      - name: Verify macOS release artifacts
        if: runner.os == 'macOS'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          DMG=$(find src-tauri/target -name 'Tunara_*.dmg' -type f -print -quit)
          if [ -z "$DMG" ]; then
            echo "No Tunara DMG was produced"
            exit 1
          fi

          scripts/verify-macos-release-bundle.sh "$DMG"

          UPDATER_ARCHIVE=$(find src-tauri/target -name '*.app.tar.gz' -type f -print -quit)
          UPDATER_SIGNATURE=$(find src-tauri/target -name '*.app.tar.gz.sig' -type f -print -quit)
          if [ -z "$UPDATER_ARCHIVE" ] || [ -z "$UPDATER_SIGNATURE" ]; then
            echo "Updater archive/signature were not produced"
            exit 1
          fi
          test -s "$UPDATER_ARCHIVE"
          test -s "$UPDATER_SIGNATURE"

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            ASSETS=$(gh release view "${GITHUB_REF_NAME}" --json assets --jq '.assets[].name')
            if ! printf '%s\n' "$ASSETS" | grep -Fxq 'latest.json'; then
              echo "latest.json was not uploaded to the GitHub release"
              exit 1
            fi
            if ! printf '%s\n' "$ASSETS" | grep -Eq '\.app\.tar\.gz$'; then
              echo "Updater archive was not uploaded to the GitHub release"
              exit 1
            fi
            if ! printf '%s\n' "$ASSETS" | grep -Eq '\.app\.tar\.gz\.sig$'; then
              echo "Updater signature was not uploaded to the GitHub release"
              exit 1
            fi
          else
            echo "Skipping GitHub release asset checks for non-tag dry-run (${GITHUB_REF_NAME})."
          fi

  publish-legacy:
    if: github.event_name == 'push' || inputs.release_mode == 'both' || inputs.release_mode == 'legacy'
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin

    runs-on: ${{ matrix.platform }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 9.15.4

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare legacy macOS release config
        run: |
          set -euo pipefail
          # Legacy is intentionally the old install path: ad-hoc signed, not
          # notarized, and manual-only. It must not produce updater metadata.
          printf '%s\n' '{"bundle":{"createUpdaterArtifacts":false}}' > /tmp/tauri-legacy-ci.json

      - name: Build legacy macOS installer
        run: pnpm tauri build ${{ matrix.args }} --config /tmp/tauri-legacy-ci.json

      - name: Re-sign legacy macOS app
        run: |
          set -euo pipefail
          APP="src-tauri/target/aarch64-apple-darwin/release/bundle/macos/Tunara.app"
          if [ ! -d "$APP" ]; then
            echo "No legacy Tunara.app was produced"
            exit 1
          fi
          codesign --force --deep --sign - --options runtime --entitlements src-tauri/Entitlements.plist "$APP"

      - name: Rebuild legacy macOS dmg
        run: |
          set -euo pipefail
          VERSION=$(node -p "require('./package.json').version")
          APP="src-tauri/target/aarch64-apple-darwin/release/bundle/macos/Tunara.app"
          STAGING=$(mktemp -d "${TMPDIR:-/tmp}/tunara-legacy-dmg-stage.XXXXXX")
          trap 'rm -rf "$STAGING"' EXIT
          cp -R "$APP" "$STAGING/Tunara.app"
          ln -s /Applications "$STAGING/Applications"
          LEGACY_DMG="src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/Tunara_${VERSION}_aarch64-legacy.dmg"
          hdiutil create -volname "Tunara" -srcfolder "$STAGING" -ov -format UDZO "$LEGACY_DMG"
          echo "LEGACY_DMG=$LEGACY_DMG" >> "$GITHUB_ENV"

      - name: Verify legacy macOS installer
        run: |
          set -euo pipefail
          DMG=${LEGACY_DMG:-}
          if [ -z "$DMG" ]; then
            echo "No legacy Tunara DMG was produced"
            exit 1
          fi
          scripts/verify-macos-legacy-bundle.sh "$DMG"

      - name: Upload legacy macOS installer
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          if [ -z "${LEGACY_DMG:-}" ] || [ ! -f "$LEGACY_DMG" ]; then
            echo "No legacy Tunara DMG was produced"
            exit 1
          fi

          release_args=(
            --title "Tunara ${TAG}"
            --notes "Tunara ${TAG}. Direct install assets are signed and notarized when Apple notarization completes. The legacy DMG is the previous manual install path and is not used by Homebrew or auto-update."
          )
          if [[ "$TAG" == *-* ]]; then
            release_args+=(--prerelease)
          fi

          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" "${release_args[@]}"
          fi

          gh release upload "$TAG" "$LEGACY_DMG" --clobber

  update-homebrew-cask:
    needs: publish-tauri
    if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # Tag push 触发的 workflow 默认 checkout 到 detached HEAD（tag ref），
      # 而我们要基于 main 改 cask，所以显式 checkout main。
      - uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0

      # The github-actions app (id 15368) is a bypass actor on the "Protect main"
      # ruleset, so this job pushes the cask bump straight to main — no PR, no
      # review. (Earlier we opened a PR to avoid GH013, but those PRs need a human
      # approval the bot can't give, so they stalled forever and the cask lagged.)
      # checkout@v7 persists the GITHUB_TOKEN git credential, so the push below
      # authenticates as the github-actions app without extra config.
      - name: Compute dmg sha256 and push cask update to main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME#v}"

          DMG_URL=$(gh release view "${GITHUB_REF_NAME}" --json assets \
            --jq '.assets[] | select(.name | test("Tunara_.*\\.dmg")) | .url' | head -1)
          if [ -z "$DMG_URL" ]; then
            echo "::error::No .dmg asset found on release ${GITHUB_REF_NAME}"
            exit 1
          fi

          SHA=$(curl -fsSL "$DMG_URL" | shasum -a 256 | awk '{print $1}')
          echo "Computed sha256: $SHA for version $TAG"

          # 更新 homebrew/tunara.rb 中的 version 和 sha256（覆盖 :no_check 或旧值）
          sed -i.bak "s/version \".*\"/version \"$TAG\"/" homebrew/tunara.rb
          sed -i.bak -E "s/^  sha256 .*/  sha256 \"$SHA\"/" homebrew/tunara.rb
          rm -f homebrew/tunara.rb.bak

          if git diff --quiet homebrew/tunara.rb; then
            echo "Homebrew cask already up to date; nothing to do."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add homebrew/tunara.rb
          git commit -m "chore: update homebrew cask to v${TAG} (sha256 ${SHA:0:12}…) [skip ci]"
          # publish-tauri 的构建+公证耗时较长，期间 main 可能被人工推进；rebase
          # 吸收并发提交，保证下面是 fast-forward（满足 non_fast_forward /
          # required_linear_history 两条 ruleset 规则）。
          git pull --rebase --autostash origin main
          git push origin HEAD:main
