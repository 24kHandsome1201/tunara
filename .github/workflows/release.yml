name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v6
        with:
          version: 9.15.4

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Conduit ${{ github.ref_name }}"
          releaseBody: "See the assets to download and install. Auto-update is built in."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  update-homebrew-cask:
    needs: publish-tauri
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Compute dmg sha256 and update cask
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME#v}"
          # 优先取 universal/aarch64 dmg
          DMG_URL=$(gh release view "${GITHUB_REF_NAME}" --json assets --jq '.assets[] | select(.name | test("Conduit_.*\\.dmg")) | .url' | head -1)
          if [ -z "$DMG_URL" ]; then
            echo "No .dmg asset found, skipping cask update"
            exit 0
          fi
          SHA=$(curl -fsSL "$DMG_URL" | shasum -a 256 | awk '{print $1}')
          echo "Computed sha256: $SHA for version $TAG"
          # 更新 homebrew/conduit.rb 中的 version 和 sha256
          sed -i.bak "s/version \".*\"/version \"$TAG\"/" homebrew/conduit.rb
          sed -i.bak "s/sha256 \".*\"/sha256 \"$SHA\"/" homebrew/conduit.rb
          rm -f homebrew/conduit.rb.bak
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add homebrew/conduit.rb
          git commit -m "chore: update homebrew cask to v${TAG} (sha256 ${SHA:0:12}…)" || exit 0
          git push
